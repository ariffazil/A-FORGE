version: '3.8'
services:
  af-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: af-bridge-prod
    ports:
      - "7071:7071"
    environment:
      - NODE_ENV=production
      - OPERATOR_API_TOKEN=arif2026
    env_file:
      - .env
    restart: unless-stopped
    network_mode: host

